<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TARTARUS — QR Generator</title>
<link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
<div class="app-shell">

  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-main">TARTARUS</span>
        <span class="logo-sub">CAMP · MMXXV</span>
      </div>
    </div>
    <div class="header-right">
      <span class="role-chip admin">⚙ QR GENERATOR</span>
    </div>
  </header>

  <div style="padding:32px; overflow-y:auto; flex:1">

    <div class="page-header">
      <h1 class="page-title">📱 QR Code Generator</h1>
      <p class="page-subtitle">สร้าง QR สำหรับพิมพ์แจกน้องๆ และพี่สต๊าฟ</p>
    </div>

    <!-- Camper QRs -->
    <div class="card mt-16">
      <div class="card-header">
        <span class="card-title">🔴 QR สำหรับน้องค่าย (แยกตามทีม)</span>
        <span class="card-meta">สแกนแล้วเข้าระบบได้เลย</span>
      </div>
      <div class="card-body">
        <div class="qr-grid" id="camperQRs"></div>
      </div>
    </div>

    <!-- Staff / Admin QRs -->
    <div class="grid-2 mt-16">
      <div class="card">
        <div class="card-header">
          <span class="card-title">🛠 QR พี่สต๊าฟ</span>
        </div>
        <div class="card-body" style="text-align:center">
          <div class="qr-placeholder" id="staffQR" style="margin:0 auto 12px"></div>
          <div class="qr-url" id="staffUrl"></div>
          <div style="margin-top:12px; font-size:12px; color:var(--text-shadow)">PIN ตั้งใน admin · ค่าเริ่มต้น: 1111 หรือ 2222</div>
          <button class="btn btn-ghost btn-sm mt-8" onclick="printQR('staff')">🖨 Print</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">👑 QR Admin</span>
        </div>
        <div class="card-body" style="text-align:center">
          <div class="qr-placeholder" id="adminQR" style="margin:0 auto 12px"></div>
          <div class="qr-url" id="adminUrl"></div>
          <div style="margin-top:12px; font-size:12px; color:var(--text-shadow)">PIN Admin: 9999 (เปลี่ยนได้ใน admin)</div>
          <button class="btn btn-ghost btn-sm mt-8" onclick="printQR('admin')">🖨 Print</button>
        </div>
      </div>
    </div>

    <!-- Direct links (fallback) -->
    <div class="card mt-16">
      <div class="card-header">
        <span class="card-title">🔗 ลิงก์ตรง (กรณีไม่มีกล้อง)</span>
      </div>
      <div class="card-body">
        <div id="directLinks" style="display:flex; flex-direction:column; gap:8px;"></div>
      </div>
    </div>

  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
function makeQR(elId, url) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = '';
  try {
    new QRCode(el, {
      text: url, width: 140, height: 140,
      colorDark: '#e4be6e', colorLight: '#17181f',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    el.innerHTML = `<div style="padding:8px;font-size:10px;word-break:break-all;color:var(--text-shadow)">${url}</div>`;
  }
}

function getBase() {
  return window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
}

function init() {
  const base = getBase();
  const teams = DB.getTeams();

  // Camper QRs
  const camperGrid = document.getElementById('camperQRs');
  camperGrid.innerHTML = teams.map(t => `
    <div class="qr-card">
      <div class="qr-card-title" style="color:${t.color}">${t.icon} ${t.name}</div>
      <div class="qr-placeholder" id="qr-${t.id}"></div>
      <div class="qr-url">${base}camper.html?team=${t.id}</div>
      <button class="btn btn-ghost btn-sm mt-8" onclick="copyUrl('${base}camper.html?team=${t.id}')">📋 Copy</button>
    </div>
  `).join('');

  teams.forEach(t => makeQR('qr-' + t.id, `${base}camper.html?team=${t.id}`));

  // Staff QR
  const staffUrl = `${base}staff.html`;
  document.getElementById('staffUrl').textContent = staffUrl;
  makeQR('staffQR', staffUrl);

  // Admin QR
  const adminUrl = `${base}admin.html`;
  document.getElementById('adminUrl').textContent = adminUrl;
  makeQR('adminQR', adminUrl);

  // Direct links
  const links = document.getElementById('directLinks');
  links.innerHTML = [
    ...teams.map(t => ({ label: t.icon + ' ' + t.name, url: `${base}camper.html?team=${t.id}`, color: t.color })),
    { label: '🛠 Staff', url: `${base}staff.html`, color: 'var(--magic-green)' },
    { label: '👑 Admin', url: `${base}admin.html`, color: 'var(--gold-bright)' },
  ].map(l => `
    <div style="display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--bg-block); border-radius:var(--r-md);">
      <span style="font-family:var(--font-title); font-size:13px; color:${l.color}; min-width:130px">${l.label}</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--text-shadow); flex:1">${l.url}</span>
      <button class="btn btn-ghost btn-sm" onclick="copyUrl('${l.url}')">Copy</button>
      <a class="btn btn-ghost btn-sm" href="${l.url}">เปิด →</a>
    </div>
  `).join('');
}

function copyUrl(url) {
  navigator.clipboard?.writeText(url).then(() => showToast('📋 คัดลอกแล้ว!'));
}

function printQR(type) { window.print(); }

function showToast(msg, type='') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2500);
}

init();
</script>
</body>
</html>
